<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARKET BRAIN | AI Stock Market Intelligence</title>
    <!-- Premium Fonts and Dashboard Core Styles Framework Layer -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background: radial-gradient(circle at top left, rgba(16, 185, 129, 0.08), transparent 45%), #05070d; color: #f8fafc; min-h-screen: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }
        
        /* Layout Structure Configs */
        .app-container { display: flex; width: 100%; min-height: 100vh; }
        .sidebar { width: 280px; background-color: rgba(2, 6, 23, 0.9); border-right: 1px solid #1e293b; padding: 24px; position: sticky; top: 0; height: 100vh; flex-shrink: 0; backdrop-filter: blur(10px); }
        .main-content { flex: 1; padding: 32px; overflow-y: auto; display: flex; flex-direction: column; gap: 32px; }
        
        /* Branding & Navigation */
        .brand { display: flex; items-center: center; gap: 12px; margin-bottom: 32px; }
        .brand-icon { background-color: #10b981; color: #000; padding: 10px; rounded-radius: 12px; font-weight: 900; display: flex; align-items: center; justify-content: center; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.2); }
        .brand-text h1 { font-size: 18px; font-weight: 900; tracking-spacing: -0.05em; color: #fff; }
        .brand-text p { font-size: 11px; text-transform: uppercase; tracking-spacing: 0.2em; color: #64748b; margin-top: 2px; }
        .nav-list { display: flex; flex-direction: column; gap: 6px; list-style: none; }
        .nav-item a { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; text-decoration: none; font-size: 14px; font-weight: 500; color: #94a3b8; transition: all 0.2s; }
        .nav-item a.active { color: #34d399; background-color: #0f172a; border: 1px solid #1e293b; font-weight: 700; }
        .nav-item a:hover:not(.active) { color: #fff; background-color: rgba(15, 23, 42, 0.4); }

        /* Panels & Hero Interface */
        .hero-panel { background-color: #020617; border: 1px solid #1e293b; border-radius: 24px; padding: 40px; position: relative; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .hero-grid { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 32px; align-items: center; position: relative; z-index: 2; }
        .badge { display: inline-flex; align-items: center; gap: 6px; background-color: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.2); color: #34d399; font-size: 12px; font-weight: 700; padding: 6px 12px; border-radius: 100px; margin-bottom: 20px; }
        .hero-panel h2 { font-size: 42px; font-weight: 900; line-height: 1.15; color: #fff; tracking-spacing: -0.03em; }
        .hero-panel p.desc { color: #94a3b8; font-size: 15px; margin-top: 16px; line-height: 1.6; max-width: 600px; }
        .btn-group { display: flex; gap: 12px; margin-top: 24px; flex-wrap: wrap; }
        .btn-primary { background-color: #10b981; color: #05070d; font-weight: 700; font-size: 13px; padding: 12px 24px; border-radius: 12px; border: none; cursor: pointer; text-decoration: none; box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.1); transition: opacity 0.2s; }
        .btn-secondary { background-color: rgba(15, 23, 42, 0.5); border: 1px solid #334155; color: #e2e8f0; font-weight: 700; font-size: 13px; padding: 12px 24px; border-radius: 12px; cursor: pointer; text-decoration: none; transition: background-color 0.2s; }
        .btn-primary:hover { opacity: 0.9; } .btn-secondary:hover { background-color: rgba(15, 23, 42, 0.8); }

        /* Metric Trackers Components */
        .metrics-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; }
        .metric-card { background-color: #020617; border: 1px solid #1e293b; border-radius: 16px; padding: 20px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .metric-card p.label { font-size: 11px; text-transform: uppercase; tracking-spacing: 0.15em; color: #64748b; font-weight: 600; }
        .metric-data { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; }
        .metric-value { font-size: 22px; font-weight: 900; color: #fff; tracking-spacing: -0.02em; }
        .change-badge { font-size: 12px; font-weight: 700; padding: 4px 8px; border-radius: 6px; }
        .change-badge.up { background-color: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.2); color: #34d399; }
        .change-badge.down { background-color: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); color: #f87171; }
        .change-badge.neutral { background-color: #0f172a; border: 1px solid #1e293b; color: #94a3b8; }

        /* Secondary Grid Section */
        .desks-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 24px; }
        .panel-box { background-color: #020617; border: 1px solid #1e293b; border-radius: 16px; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
        .panel-header { border-bottom: 1px solid #1e293b; padding-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }
        .panel-header h3 { font-size: 14px; font-weight: 700; text-transform: uppercase; tracking-spacing: 0.05em; color: #cbd5e1; display: flex; align-items: center; gap: 8px; }
        .panel-header span.route { font-size: 10px; font-family: monospace; color: #64748b; }

        /* Tables Data Matrix Formatting */
        .table-container { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 13px; min-width: 400px; }
        th { color: #64748b; text-transform: uppercase; font-size: 11px; tracking-spacing: 0.05em; font-weight: 600; padding-bottom: 10px; border-b: 1px solid rgba(30, 41, 59, 0.6); }
        td { padding: 12px 0; border-bottom: 1px solid rgba(30, 41, 59, 0.4); }
        tr:last-child td { border-bottom: none; }

        /* Broker Items formatting */
        .broker-list { display: flex; flex-direction: column; gap: 10px; }
        .broker-item { padding: 12px; background-color: rgba(15, 23, 42, 0.5); border: 1px solid #1e293b; border-radius: 12px; display: flex; align-items: center; justify-content: space-between; }
        .broker-info { display: flex; align-items: center; gap: 12px; }
        .broker-avatar { width: 36px; height: 36px; background-color: #020617; border: 1px solid #1e293b; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #94a3b8; }
        .broker-meta p { font-size: 12px; font-weight: 700; color: #e2e8f0; }
        .broker-meta span { font-size: 10px; color: #64748b; }
        .status-pill { font-size: 10px; font-weight: 700; color: #34d399; background-color: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.2); padding: 4px 10px; border-radius: 6px; }

        /* Mobile Header */
        .mobile-header { display: none; background-color: rgba(2, 6, 23, 0.9); border-bottom: 1px solid #1e293b; padding: 14px 20px; position: sticky; top: 0; z-index: 40; backdrop-filter: blur(10px); justify-content: space-between; align-items: center; border-radius: 16px; margin-bottom: 8px; }

        /* Responsive Breakpoints Rules Override */
        @media (max-width: 1200px) {
            .app-container { flex-direction: column; }
            .sidebar { display: none; }
            .mobile-header { display: flex; }
            .main-content { padding: 16px; gap: 20px; }
            .hero-grid { grid-template-columns: 1fr; gap: 24px; }
            .hero-panel { padding: 24px; border-radius: 20px; }
            .hero-panel h2 { font-size: 28px; }
        }
    </style>
</head>
